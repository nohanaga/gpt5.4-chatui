<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPT-5.4 Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <!-- Markdown / Syntax highlight / Mermaid -->
    <link id="hljsTheme" rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.92.58.11.79-.25.79-.56v-2c-3.2.7-3.88-1.36-3.88-1.36-.52-1.33-1.27-1.69-1.27-1.69-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.02 1.75 2.69 1.24 3.34.95.1-.74.4-1.24.72-1.53-2.55-.29-5.24-1.28-5.24-5.7 0-1.26.45-2.29 1.18-3.1-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.16 1.18a10.93 10.93 0 0 1 5.76 0c2.2-1.49 3.16-1.18 3.16-1.18.62 1.58.23 2.75.11 3.04.74.81 1.18 1.84 1.18 3.1 0 4.43-2.7 5.41-5.27 5.69.41.36.78 1.06.78 2.13v3.16c0 .31.21.68.8.56C20.21 21.39 23.5 17.08 23.5 12 23.5 5.65 18.35.5 12 .5z"/></svg>
                    <span>GPT-5.4 Chat</span>
                </div>
                <button id="newChatBtn" class="new-chat" data-i18n-title="newChat" title="新しいチャット">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </div>

            <div class="sidebar-section">
                <div class="section-title" data-i18n="reasoningEffort">推論モード</div>
                <div class="effort-options">
                    <label><input type="radio" name="effort" value="none"><span>none</span></label>
                    <label><input type="radio" name="effort" value="low"><span>low</span></label>
                    <label><input type="radio" name="effort" value="medium" checked><span>medium</span></label>
                    <label><input type="radio" name="effort" value="high"><span>high</span></label>
                    <label><input type="radio" name="effort" value="xhigh"><span>xhigh</span></label>
                </div>
            </div>
            <div class="sidebar-section">
                <div class="section-title" data-i18n="mcpServer">MCP サーバ</div>
                <label class="mcp-toggle">
                    <input type="checkbox" id="mcpToggle" checked>
                    <div class="mcp-card">
                        <div class="mcp-card-head">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4M21 12c0 4.97-4.03 9-9 9s-9-4.03-9-9 4.03-9 9-9 9 4.03 9 9z"/></svg>
                            <span class="mcp-name">Microsoft Learn</span>
                            <span class="mcp-status">OFF</span>
                        </div>
                        <div class="mcp-desc" data-i18n="mcpDesc">learn.microsoft.com の公式ドキュメントを検索</div>
                    </div>
                </label>
            </div>
            <div class="sidebar-section">
                <div class="section-title" data-i18n="toolSearch">Tool Search</div>
                <label class="mcp-toggle">
                    <input type="checkbox" id="toolSearchToggle">
                    <div class="mcp-card">
                        <div class="mcp-card-head">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
                            <span class="mcp-name">CRM namespace (demo)</span>
                            <span class="mcp-status">OFF</span>
                        </div>
                        <div class="mcp-desc" data-i18n="toolSearchDesc">deferred ツールを動的にロードする GPT-5.4 新機能のデモ</div>
                    </div>
                </label>
            </div>
            <div class="sidebar-section">
                <div class="section-title" data-i18n="verbosity">Verbosity</div>
                <div class="effort-options">
                    <label><input type="radio" name="verbosity" value="low"><span>low</span></label>
                    <label><input type="radio" name="verbosity" value="medium" checked><span>medium</span></label>
                    <label><input type="radio" name="verbosity" value="high"><span>high</span></label>
                </div>
            </div>
            <div class="sidebar-section">
                <div class="section-title" data-i18n="options">オプション</div>
                <label class="opt-toggle">
                    <input type="checkbox" id="reasoningTextToggle">
                    <span data-i18n="showReasoningText">推論本体テキストを表示</span>
                </label>
                <label class="opt-toggle">
                    <input type="checkbox" id="preamblesToggle" checked>
                    <span data-i18n="showPreambles">ツール呼び出し前の Preamble を表示</span>
                </label>
            </div>
            <div class="sidebar-section model-info">
                <div class="section-title" data-i18n="model">モデル</div>
                <div class="model-name">{{ model }}</div>
            </div>

            <div class="sidebar-toolbar sidebar-toolbar-bottom">
                <button id="themeToggle" class="icon-btn" data-i18n-title="toggleTheme" title="テーマ切替">
                    <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
                    <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    <span class="theme-label" data-i18n="themeDark">ダーク</span>
                </button>
                <button id="langToggle" class="icon-btn" data-i18n-title="toggleLang" title="言語切替">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15 15 0 0 1 0 20"/><path d="M12 2a15 15 0 0 0 0 20"/></svg>
                    <span class="lang-label">日本語</span>
                </button>
            </div>
        </aside>

        <main class="chat">
            <header class="chat-header">
                <div class="chat-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <span data-i18n="askCopilot">Ask Copilot</span>
                </div>
            </header>

            <div id="messages" class="messages">
                <div class="welcome">
                    <h1 data-i18n="welcomeTitle">GPT-5.4 へようこそ</h1>
                    <p data-i18n="welcomeBody">質問を入力してください。推論サマリーと回答をストリーミング表示します。</p>
                    <div class="suggestions">
                        <button class="suggestion" data-i18n="suggest1">相対性理論を分かりやすく説明して</button>
                        <button class="suggestion" data-i18n="suggest2">フィボナッチを Python で実装</button>
                        <button class="suggestion" data-i18n="suggest3">7つの橋の問題を証明して</button>
                        <button class="suggestion" data-i18n="suggest4">SQL の JOIN を例で教えて</button>
                        <button class="suggestion" data-i18n="suggest5">顧客 CUST-12345 の未処理注文を確認</button>
                        <button class="suggestion" data-i18n="suggest6">Azure AI Search の 2026年3月の Update を教えて</button>
                    </div>
                </div>
            </div>

            <div class="composer">
                <form id="composerForm">
                    <div class="input-wrap">
                        <textarea id="input" rows="1" data-i18n-placeholder="placeholder" placeholder="GPT-5.4 に質問する… (Shift+Enter で改行)"></textarea>
                        <button type="submit" id="sendBtn" class="send" data-i18n-title="send" title="送信">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
                        </button>
                        <button type="button" id="cancelBtn" class="cancel" data-i18n-title="stop" title="停止" hidden>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1.5"/></svg>
                        </button>
                    </div>
                    <div class="composer-foot">
                        <span class="hint" data-i18n="hint">Enter で送信 / Shift+Enter で改行</span>
                        <span id="status" class="status"></span>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
